    <!-- GitHub Pages SPA 라우팅(404 -> index) 복구용 -->
    <script>
      (function () {
        var l = window.location;
        if (l.search && l.search.indexOf('p=') !== -1) {
          var params = {};
          l.search
            .slice(1)
            .split('&')
            .forEach(function (v) {
              var a = v.split('=');
              params[a[0]] = a.slice(1).join('=');
            });
          var p = params.p ? decodeURIComponent(params.p) : '';
          var q = params.q ? decodeURIComponent(params.q) : '';
          var newUrl = l.pathname + (p || '') + (q ? '?' + q : '') + l.hash;
          window.history.replaceState(null, null, newUrl);
        }
      })();
    </script>
